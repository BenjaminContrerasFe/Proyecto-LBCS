<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/registro.css">
    <link rel="icon" href="galeria/Diseño sin título.png" type="image/png">
</head>
<body>
    <div class="split-screen">
  
  <div class="left-side">
    <div class="brand-overlay">
      <a class="brand-logo" href="index.html">HomeScape</a>
    </div>
    <img src="galeria/images.jfif" alt="Alojamiento acogedor" class="bg-image">
  </div>

  <div class="right-side">
    
    <header class="form-header">
      <span class="brand-logo-mobile">HomeScape</span>
      <div class="nav-links">
        <a href="#">Iniciar sesión</a>
        <a href="#" class="active">Regístrate</a>
      </div>
    </header>

    <div class="card-container">
      <div class="form-card">
        <h2>Crear una cuenta</h2>
        <p class="subtitle">Registrate para gestionar tus reservas de forma más fácil.</p>

        <form>
          <div class="input-group">
            <label for="email">Dirección de e-mail</label>
            <input type="email" id="email" placeholder="Introduce tu e-mail">
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Crea una contraseña">
          </div>

          <button type="submit" class="btn-main">Continuar con e-mail</button>
        </form>

        <div class="divider-container">
          <hr class="line">
          <span class="divider-text">o elige otra opción</span>
          <hr class="line">
        </div>

        <div class="social-buttons">
          <button class="btn-social">Google</button>
          <button class="btn-social">Facebook</button>
          <button class="btn-social">Apple</button>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
